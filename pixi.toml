[workspace]
name = "zlib"
version = "0.1.0"
authors = ["Marius S <marius@seritan.net>"]
description = "A Mojo zlib binding (inflate/deflate) via FFI to libz. Used for PDF FlateDecode (pdftotext.mojo) and general decompression."
# Org nightly — matches headgate/flare so this resolves via `-I` against the same
# toolchain.
channels = [
    "https://conda.modular.com/max-nightly",
    "conda-forge",
]
platforms = ["osx-arm64"]

[dependencies]
mojo = "==1.0.0b3.dev2026062706"
zlib = ">=1.3.1,<2"

[tasks]
# Build the FFI shim ($CONDA_PREFIX/lib/libzlibmojo.so) — like flare's flare-ffi.
ffi = "bash src/ffi/build.sh"
# Round-trip gate: deflate -> inflate -> original. The shim is dlopened at
# runtime, so consumers just `-I ../zlib.mojo/src` + the built shim (no link flags).
test = { cmd = "mkdir -p build && mojo build test/zlib_test.mojo -I src -o build/zlib-test && ./build/zlib-test", depends-on = ["ffi"] }
